<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Staff Hiring — Newport Hospitality Group</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-text-size-adjust:100%;}
    body{background:#0d1117;font-family:Georgia,serif;color:#f0f6fc;min-height:100vh;}
    button,textarea,input,select{font-family:Georgia,serif;-webkit-appearance:none;appearance:none;}
    input,textarea,select{font-size:16px!important;} /* prevents iOS zoom on focus */
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:#0d1117;}
    ::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px;}

    .check-row{display:flex;align-items:flex-start;gap:12px;padding:13px 8px;
      border-bottom:1px solid #161b22;cursor:pointer;border-radius:6px;transition:background 0.1s;}
    .check-row:last-child{border-bottom:none;}
    .check-row:active{background:rgba(240,180,41,0.07);}
    @media(hover:hover){.check-row:hover{background:rgba(240,180,41,0.05);}}

    .chkbox{width:22px;height:22px;min-width:22px;border-radius:4px;border:2px solid #30363d;
      display:flex;align-items:center;justify-content:center;transition:all 0.15s;margin-top:1px;}
    .chkbox.on{background:#10b981;border-color:#34d399;}

    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;
      align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .modal{background:#161b22;border:1px solid #f0b429;border-radius:14px;padding:22px;width:100%;max-width:600px;margin:auto;}

    .tab-btn{padding:8px 14px;border-radius:20px;border:1px solid #30363d;background:transparent;
      color:#8b949e;font-size:12px;cursor:pointer;letter-spacing:0.04em;transition:all 0.15s;white-space:nowrap;}
    .tab-btn.active{background:#f0b429;color:#0d1117;border-color:#f0b429;font-weight:bold;}

    /* Header responsive */
    .hdr-inner{display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .hdr-btns{display:flex;gap:8px;flex-shrink:0;}
    @media(max-width:480px){
      .hdr-inner{flex-wrap:wrap;}
      .hdr-btns{width:100%;justify-content:flex-end;}
    }

    /* Stats grid */
    .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;}
    @media(max-width:400px){.stats-grid{grid-template-columns:1fr 1fr;}}

    /* Gateway position buttons */
    .pos-btns{display:flex;flex-wrap:wrap;gap:10px;}
    .pos-btn{display:flex;align-items:center;gap:8px;padding:11px 16px;border-radius:8px;
      cursor:pointer;transition:all 0.15s;border-width:1px;border-style:solid;flex:1;min-width:140px;
      justify-content:center;}
    @media(max-width:400px){.pos-btn{min-width:100%;}}

    /* Rating buttons */
    .rating-row{display:flex;gap:8px;}
    .rating-btn{flex:1;padding:12px 4px;border-radius:6px;font-weight:bold;font-size:13px;
      cursor:pointer;border-width:2px;border-style:solid;font-family:Georgia,serif;transition:all 0.15s;
      text-align:center;min-height:48px;}
    @media(max-width:360px){.rating-btn{font-size:11px;padding:10px 2px;}}

    /* Candidate card action row */
    .card-actions{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
    .card-action-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    @media(max-width:480px){
      .card-actions{flex-direction:column;align-items:stretch;}
      .card-action-btns{justify-content:flex-end;}
    }

    /* Company header stats */
    .co-hdr-stats{display:flex;gap:12px;font-size:12px;}
    @media(max-width:500px){.co-hdr-stats{display:none;}}

    /* Edit grid */
    .edit-date-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media(max-width:400px){.edit-date-grid{grid-template-columns:1fr;}}

    /* Nav buttons */
    .nav-btn-row{display:flex;gap:10px;margin-top:4px;}
    .nav-btn-row button{flex:1;}

    /* Summary status buttons */
    .status-btn-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:16px;}

    /* Availability day row */
    .avail-day-row{display:flex;align-items:center;gap:8px;border-radius:7px;padding:8px 10px;transition:all 0.15s;}
    .shift-btns{display:flex;gap:5px;flex-wrap:wrap;}
    @media(max-width:380px){.shift-btns{gap:3px;}}

    /* Contract modal pay row */
    .pay-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media(max-width:400px){.pay-row{grid-template-columns:1fr;}}

    /* Confirm delete */
    .confirm-del{display:flex;align-items:center;gap:8px;background:rgba(248,81,73,0.1);
      border:1px solid #f85149;border-radius:8px;padding:8px 12px;flex-wrap:wrap;}
    @media(max-width:480px){.confirm-del{flex-direction:column;align-items:stretch;text-align:center;}}
    .confirm-del-btns{display:flex;gap:6px;}
    @media(max-width:480px){.confirm-del-btns{justify-content:center;}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const C={bg:"#0d1117",mid:"#161b22",light:"#21262d",border:"#30363d",

    teal:"#10b981",tealL:"#34d399",red:"#f85149"};

  const COMPANIES={

  const POS_QUESTIONS={
    bartender:[
      {id:"q1",text:"What is your availability — evenings, weekends, and peak season April–October?",hint:"Evening and weekend availability is essential",weight:2},

      {id:"q4",text:"Describe your experience in a high-volume or fast-paced bar environment.",hint:"Look for composure under pressure and team awareness",weight:2},

      {id:"q8",text:"Do you have a food handler's card or are you willing to obtain one?",hint:"Oregon requirement — can be obtained quickly if not current",weight:1},
      {id:"q9",text:"Can you provide references from previous bar or hospitality employers?",hint:"2+ references expected",weight:1},
      {id:"q10",text:"Why do you want to work at Sea Lion Dockside Bar specifically?",hint:"Look for genuine enthusiasm for the Newport waterfront",weight:1},

      {id:"q2",text:"Do you have retail or customer-facing sales experience?",hint:"Any retail, boutique, or tourist shop experience is ideal",weight:3},
      {id:"q3",text:"Are you comfortable operating a cash register and POS system?",hint:"Square, Shopify, or similar — accuracy with transactions matters",weight:2},

      {id:"q10",text:"Why do you want to work in a gift shop at a waterfront tourist destination?",hint:"Look for enthusiasm for hospitality and local Newport culture",weight:1},
    ],
    all:[
      {id:"q1",text:"What is your full schedule availability — evenings, early mornings, weekends, and peak season?",hint:"All positions require flexible availability April–October minimum",weight:2},
      {id:"q2",text:"Which position interests you most — Bartender, Barista, Gift Shop, or all three equally?",hint:"Listen for genuine interest vs just wanting any available job",weight:2},
      {id:"q3",text:"Describe your overall experience in hospitality, food service, retail, or bar work.",hint:"Look for breadth and adaptability across different customer-facing roles",weight:3},
      {id:"q4",text:"Do you have OLCC certification, a food handler's card, or barista training?",hint:"The more certs the better — note which they have and which they'd obtain",weight:2},
      {id:"q5",text:"How do you handle working in a fast-paced, high-traffic tourist environment for a full shift?",hint:"Summer at Newport waterfront is intense — gauge their stamina and mindset",weight:2},
      {id:"q6",text:"Describe your customer service approach when dealing with a wide range of guests.",hint:"Tourists, locals, families, frustrated guests — look for adaptability",weight:3},
      {id:"q7",text:"Do you have experience with POS systems and accurate cash handling?",hint:"Will use registers in all three venues — accuracy is non-negotiable",weight:1},

    {id:"c5",label:"Shift expectations covered",sub:"Start times, shift length, and weekend requirements explained"},

    {id:"c8",label:"Training process explained",sub:"Onboarding timeline and training period discussed"},

  function calcScore(answers,questions){
    let total=0,max=0;
    questions.forEach(q=>{const a=answers[q.id];if(a&&a.rating)total+=a.rating*q.weight;max+=3*q.weight;});
    return{score:total,max,pct:max>0?Math.round((total/max)*100):0};
  }

    if(pct>=80)return{label:"🟢 Top Candidate",color:C.tealL};

  /* ── CONTRACT GENERATOR ── */

    const dutiesMap={
      bartender:`<li>Mix and serve beverages in full compliance with OLCC regulations and responsible alcohol service standards</li><li>Maintain a clean, organized, and professional bar environment throughout each shift</li><li>Provide exceptional guest service to tourists and locals alike</li><li>Handle cash and POS transactions accurately and honestly at all times</li><li>Monitor guest consumption and confidently enforce responsible alcohol service policies</li><li>Collaborate with kitchen and front-of-house staff to ensure smooth operations</li><li>Maintain a current OLCC Alcohol Server Permit throughout employment</li>`,
      barista:`<li>Prepare espresso drinks, drip coffee, cold brew, and specialty beverages to consistent quality standards</li><li>Maintain a clean, organized, and food-safe coffee station throughout each shift</li><li>Deliver fast, friendly, and accurate service during high-traffic tourist periods</li><li>Operate commercial espresso machines, grinders, and brewing equipment with care</li><li>Follow all Oregon food safety and health code requirements at all times</li><li>Support the broader team across front-of-house duties as directed</li><li>Maintain a current Oregon Food Handler's Card throughout employment</li>`,
      giftshop:`<li>Welcome and assist guests in a warm, knowledgeable, and professional manner</li><li>Operate the POS system and handle all cash and card transactions with accuracy</li><li>Maintain organized, clean, well-stocked, and visually attractive product displays</li><li>Assist with inventory management, receiving shipments, and restocking shelves</li><li>Represent ${co.name} as a welcoming ambassador for Newport's local culture</li><li>Handle guest concerns, returns, and complaints with professionalism and care</li><li>Support fellow team members during peak tourist hours as directed</li>`,

    };

    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Offer Letter — ${c.name}</title>
    <style>body{font-family:Georgia,serif;color:#111;padding:0;max-width:740px;margin:0 auto;}

    .cn{font-size:20px;font-weight:bold;color:#0d1117;}.cs{font-size:11px;color:#555;margin-top:3px;}
    .cc{font-size:11px;color:#666;text-align:right;line-height:1.7;}
    h2{font-size:17px;color:#0d1117;margin-bottom:14px;border-bottom:1px solid #ddd;padding-bottom:6px;}
    p{font-size:13px;color:#222;line-height:1.8;margin-bottom:12px;}
    table{width:100%;border-collapse:collapse;margin:16px 0;}td{padding:8px 10px;font-size:13px;border-bottom:1px solid #eee;vertical-align:top;}
    td:first-child{font-weight:bold;color:#0d1117;width:180px;white-space:nowrap;}
    @media(max-width:500px){td:first-child{width:120px;font-size:12px;}td{font-size:12px;padding:7px 8px;}}

    <body><div class="page">
    <div class="np" style="background:#f0b429;color:#0d1117;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-radius:8px;margin-bottom:20px;flex-wrap:wrap;gap:8px;">

    <div class="badge">${pos.title.toUpperCase()}</div>

        <div><div class="sb"></div><div class="sl">EMPLOYEE SIGNATURE</div>
          <div style="margin-top:14px;"><div class="sb"></div><div class="sl">PRINTED NAME</div></div>

        <div><div class="sb"></div><div class="sl">EMPLOYER SIGNATURE</div>
          <div style="margin-top:14px;"><div class="sb" style="display:flex;align-items:flex-end;padding-bottom:4px;"><span style="font-size:13px;">${co.name}</span></div><div class="sl">COMPANY</div></div>
          <div style="margin-top:14px;"><div class="sb"></div><div class="sl">DATE</div></div></div>

  /* ── LOGIN GATE ── */
  const PASSWORD="sea2026";
  function LoginGate({onUnlock}){
    const [input,setInput]=React.useState("");
    const [error,setError]=React.useState(false);
    const [shake,setShake]=React.useState(false);
    function attempt(){
      if(input.toLowerCase().trim()===PASSWORD){sessionStorage.setItem("nhg-auth","1");setTimeout(()=>onUnlock(),0);}
      else{setError(true);setShake(true);setInput("");setTimeout(()=>setShake(false),600);}
    }
    return(
      <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:C.mid,border:`1px solid ${C.amber}`,borderRadius:14,padding:"36px 28px",
          width:"100%",maxWidth:400,textAlign:"center",transform:shake?"translateX(6px)":"none",transition:"transform 0.1s"}}>
          <div style={{fontSize:12,color:C.dim,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:14}}>Newport Hospitality Group</div>
          <div style={{display:"flex",justifyContent:"center",gap:14,fontSize:30,marginBottom:14}}>🦁☕⚓</div>
          <div style={{fontSize:21,fontWeight:"bold",color:C.amberL,marginBottom:4}}>Staff Hiring Portal</div>
          <div style={{fontSize:11,color:C.dim,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:24}}>Internal Use Only</div>
          <input style={{background:C.bg,border:`1px solid ${error?C.red:C.border}`,borderRadius:6,padding:"13px 14px",
            color:C.cream,fontSize:18,outline:"none",width:"100%",textAlign:"center",letterSpacing:"0.12em"}}
            type="password" placeholder="Enter password" value={input}
            onChange={e=>{setInput(e.target.value);setError(false);}}
            onKeyDown={e=>e.key==="Enter"&&attempt()} autoFocus/>
          {error&&<div style={{fontSize:12,color:C.red,marginTop:8}}>Incorrect password — try again</div>}

    );

    const [dashTab,setDashTab]=React.useState("all");
    const [search,setSearch]=React.useState("");

    React.useEffect(()=>{
      fetch("/api/staff-candidates").then(r=>r.json())
        .then(d=>{if(Array.isArray(d.candidates))setCandidates(d.candidates);})
        .catch(()=>{try{const s=localStorage.getItem("nhg-candidates");if(s)setCandidates(JSON.parse(s));}catch{}});
    },[]);

    function persist(u){
      fetch("/api/staff-candidates",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({candidates:u})})
        .catch(()=>{try{localStorage.setItem("nhg-candidates",JSON.stringify(u));}catch{}});
    }

    const questions=position?POS_QUESTIONS[position]:[];
    const totalSteps=questions.length+1;

    function startInterview(co,pos){
      setCompany(co);setPosition(pos);setStep(0);setAnswers({});
      setCandName("");setCandPhone("");setCandNotes("");setFinalNotes("");
      setChecklist({});setAvail({months:{},days:{},commitment:"",startDate:"",endDate:"",availNotes:""});
      setCurrent(null);setView("interview");
    }
    function setAns(qid,field,val){setAnswers(prev=>({...prev,[qid]:{...prev[qid],[field]:val}}));}
    function toggleCheck(id){setChecklist(prev=>({...prev,[id]:!prev[id]}));}
    function finish(){
      const s=calcScore(answers,questions);
      const c={id:Date.now().toString(),name:candName.trim()||"Unnamed",phone:candPhone.trim(),
        company,position,notes:candNotes.trim(),answers,...s,
        finalNotes:finalNotes.trim(),checklist,avail,status:null,
        date:new Date().toLocaleDateString(),time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})};
      const updated=[c,...candidates];setCandidates(updated);persist(updated);setCurrent(c);setView("summary");
    }
    function setStatus(id,status){
      const updated=candidates.map(c=>c.id===id?{...c,status:c.status===status?null:status}:c);
      setCandidates(updated);persist(updated);
    }
    function deleteCand(id){
      const updated=candidates.filter(c=>c.id!==id);setCandidates(updated);persist(updated);
      if(detailId===id)setDetailId(null);setConfirmDel(null);
    }
    function openEdit(c){
      setEditId(c.id);setEditData({name:c.name,phone:c.phone||"",notes:c.notes||"",finalNotes:c.finalNotes||"",
        avail:c.avail?JSON.parse(JSON.stringify(c.avail)):{months:{},days:{},commitment:"",startDate:"",endDate:"",availNotes:""}});
    }
    function saveEdit(id){
      const updated=candidates.map(c=>c.id===id?{...c,...editData}:c);setCandidates(updated);persist(updated);setEditId(null);setEditData({});
    }

      if(!search) return true;
      const q=search.toLowerCase();
      return c.name?.toLowerCase().includes(q)||c.phone?.includes(q)||

                    <label style={labelS}>Final Notes<textarea style={{...inputS,height:56,resize:"vertical"}} value={editData.finalNotes||""} onChange={e=>setEditData(p=>({...p,finalNotes:e.target.value}))}/></label>
                    <label style={labelS}>Commitment<select style={{...inputS,cursor:"pointer"}} value={editData.avail?.commitment||""} onChange={e=>setEditData(p=>({...p,avail:{...p.avail,commitment:e.target.value}}))}>
                      <option value="">— Select —</option>
                      {["Full Season","Most of Season","Weekends Only","Flexible / TBD"].map(cl=><option key={cl} value={cl}>{cl}</option>)}
                    </select></label>
                    <div className="edit-date-grid">
                      <label style={labelS}>Start Date<input type="date" style={inputS} value={editData.avail?.startDate||""} onChange={e=>setEditData(p=>({...p,avail:{...p.avail,startDate:e.target.value}}))}/></label>
                      <label style={labelS}>End Date<input type="date" style={inputS} value={editData.avail?.endDate||""} onChange={e=>setEditData(p=>({...p,avail:{...p.avail,endDate:e.target.value}}))}/></label>
                    </div>
                    <label style={labelS}>Scheduling Notes<textarea style={{...inputS,height:48,resize:"vertical"}} value={editData.avail?.availNotes||""} onChange={e=>setEditData(p=>({...p,avail:{...p.avail,availNotes:e.target.value}}))}/></label>
                  </div>
                  <div style={{display:"flex",gap:8,marginTop:12}}>
                    <button onClick={e=>{e.stopPropagation();setEditId(null);}} style={{...nBtn,flex:1,padding:"10px 0",fontSize:13}}>Cancel</button>
                    <button onClick={e=>{e.stopPropagation();saveEdit(c.id);}} style={{...pBtn,flex:2,padding:"10px 0",fontSize:13,background:C.teal}}>✓ Save Changes</button>
                  </div>
                </div>
              )}

              {/* Action buttons */}
              <div className="card-actions">
                <button onClick={e=>{e.stopPropagation();downloadPDF(c);}} style={{...nBtn,color:C.tealL,borderColor:C.tealL,fontSize:12,padding:"9px 14px",minHeight:38}}>📄 PDF</button>
                <div className="card-action-btns">
                  {editId!==c.id&&<button onClick={e=>{e.stopPropagation();setConfirmDel(null);openEdit(c);}} style={{...nBtn,color:C.amber,borderColor:C.amber,fontSize:12,padding:"9px 14px",minHeight:38}}>✏️ Edit</button>}
                  {confirmDel===c.id?(
                    <div className="confirm-del" onClick={e=>e.stopPropagation()}>
                      <span style={{fontSize:12,color:C.red}}>Remove this candidate?</span>
                      <div className="confirm-del-btns">
                        <button onClick={e=>{e.stopPropagation();deleteCand(c.id);}} style={{background:C.red,color:"#fff",border:"none",borderRadius:5,padding:"7px 12px",fontSize:12,fontWeight:"bold",cursor:"pointer",fontFamily:"Georgia,serif",minHeight:36}}>Yes, Remove</button>
                        <button onClick={e=>{e.stopPropagation();setConfirmDel(null);}} style={{...nBtn,padding:"7px 10px",fontSize:12,minHeight:36}}>Cancel</button>
                      </div>
                    </div>
                  ):(
                    <button onClick={e=>{e.stopPropagation();setEditId(null);setConfirmDel(c.id);}} style={{...nBtn,color:C.red,borderColor:C.red,fontSize:12,padding:"9px 14px",minHeight:38}}>🗑 Remove</button>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    return(
      <div style={{background:C.bg,minHeight:"100vh"}}>
        {contractFor&&<ContractModal candidate={contractFor} onClose={()=>setContractFor(null)}/>}

        {/* HEADER */}
        <div style={{background:C.mid,borderBottom:`2px solid ${C.amber}`,padding:"12px 16px",position:"sticky",top:0,zIndex:100}}>
          <div className="hdr-inner">
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:18,letterSpacing:2}}>🦁☕⚓</div>
              <div>
                <div style={{fontSize:14,fontWeight:"bold",color:C.amberL,letterSpacing:"0.04em",lineHeight:1.2}}>NEWPORT HOSPITALITY GROUP</div>
                <div style={{fontSize:10,color:C.dim,letterSpacing:"0.12em",textTransform:"uppercase"}}>Staff Hiring — Internal</div>
              </div>
            </div>
            <div className="hdr-btns">
              {view!=="gateway"&&<button onClick={()=>setView("gateway")} style={{...nBtn,padding:"8px 12px",fontSize:12,minHeight:38}}>← Companies</button>}
              {view!=="dashboard"&&<button onClick={()=>setView("dashboard")} style={{...nBtn,padding:"8px 12px",fontSize:12,minHeight:38}}>Dashboard</button>}
              {view==="dashboard"&&<button onClick={()=>setView("gateway")} style={{...pBtn,padding:"8px 14px",fontSize:13,minHeight:38}}>+ New</button>}
            </div>
          </div>
        </div>

        <div style={{maxWidth:780,margin:"0 auto",padding:"20px 14px"}}>

          {/* ── GATEWAY ── */}
          {view==="gateway"&&(
            <div>
              <h2 style={{fontSize:20,color:C.amberL,marginBottom:5}}>Select a Company</h2>
              <div style={{fontSize:13,color:C.dim,marginBottom:22}}>Choose the company you're hiring for, then select a position.</div>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {Object.entries(COMPANIES).map(([key,co])=>(
                  <div key={key} style={{...cardS}}>
                    <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
                      <div style={{fontSize:36}}>{co.icon}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:18,fontWeight:"bold",color:co.colorL}}>{co.name}</div>
                        <div style={{fontSize:12,color:C.dim,marginTop:2}}>{co.address} · {candidates.filter(c=>c.company===key).length} interviewed</div>
                      </div>
                    </div>
                    <div className="pos-btns">
                      {co.positions.map(pos=>{
                        const p=POS_LABELS[pos];
                        return(
                          <button key={pos} onClick={()=>startInterview(key,pos)} className="pos-btn"
                            style={{background:co.colorBg,border:`1px solid ${co.color}`,fontFamily:"Georgia,serif"}}>
                            <span style={{fontSize:16}}>{p.icon}</span>
                            <span style={{fontSize:14,color:co.colorL,fontWeight:"bold"}}>{p.title}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:18,textAlign:"center"}}>
                <button onClick={()=>setView("dashboard")} style={{...nBtn,fontSize:13}}>📊 View All Candidates →</button>
              </div>
            </div>
          )}

          {/* ── INTERVIEW ── */}
          {view==="interview"&&(()=>{
            const co=COMPANIES[company]||{};const pos=POS_LABELS[position]||{};
            return(
              <div>
                {/* Progress bar */}
                <div style={{marginBottom:20}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                    <span style={{fontSize:11,color:C.dim,textTransform:"uppercase",letterSpacing:"0.08em"}}>{co.icon} {co.short} — {pos.icon} {pos.title}</span>
                    <span style={{fontSize:11,color:C.amber}}>{step===0?"Info":step===WRAPUP?"Wrap-Up":`Q${step}/${questions.length}`}</span>
                  </div>
                  <div style={{background:C.light,borderRadius:4,height:4}}>
                    <div style={{background:co.color||C.amber,height:"100%",borderRadius:4,width:`${step===0?2:(step/totalSteps)*100}%`,transition:"width 0.3s"}}/>
                  </div>
                </div>

                {/* Step 0 */}
                {step===0&&(
                  <div style={cardS}>
                    <div style={{fontSize:15,fontWeight:"bold",color:C.amberL,marginBottom:18}}>📋 Candidate Information</div>
                    <div style={{display:"flex",flexDirection:"column",gap:14}}>
                      <label style={labelS}>Full Name *<input style={inputS} placeholder="e.g. Jane Smith" value={candName} onChange={e=>setCandName(e.target.value)} autoFocus/></label>
                      <label style={labelS}>Phone Number<input style={inputS} type="tel" placeholder="(541) 555-0199" value={candPhone} onChange={e=>setCandPhone(e.target.value)}/></label>
                      <label style={labelS}>Initial Impressions<textarea style={{...inputS,height:76,resize:"vertical"}} placeholder="First impression, referral source, energy level…" value={candNotes} onChange={e=>setCandNotes(e.target.value)}/></label>
                    </div>
                    <button onClick={()=>setStep(1)} disabled={!candName.trim()}
                      style={{...pBtn,marginTop:20,width:"100%",opacity:candName.trim()?1:0.4,background:co.color||C.amber,color:"#fff"}}>
                      Begin Interview →
                    </button>
                  </div>
                )}

                {/* Questions */}
                {step>=1&&step<=questions.length&&(()=>{
                  const q=questions[step-1];const ans=answers[q.id]||{};
                  return(
                    <div style={cardS}>
                      <div style={{fontSize:11,color:co.colorL||C.amber,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>Question {step} of {questions.length}</div>
                      <div style={{fontSize:17,color:C.cream,lineHeight:1.55,fontWeight:"bold",marginBottom:10}}>{q.text}</div>
                      <div style={{fontSize:12,color:C.tealL,fontStyle:"italic",marginBottom:18,lineHeight:1.5}}>💡 {q.hint}</div>
                      <label style={labelS}>Candidate's Answer / Notes
                        <textarea style={{...inputS,height:80,resize:"vertical"}} placeholder="Type what they say…"
                          value={ans.note||""} onChange={e=>setAns(q.id,"note",e.target.value)}/>
                      </label>
                      <div style={{marginTop:14}}>
                        <div style={{fontSize:11,color:C.dim,marginBottom:8,letterSpacing:"0.05em",textTransform:"uppercase"}}>Rate this answer</div>
                        <div className="rating-row">
                          {[1,2,3].map(r=>(
                            <button key={r} onClick={()=>setAns(q.id,"rating",r)} className="rating-btn" style={{
                              border:ans.rating===r?`2px solid ${RATINGS[r].color}`:`2px solid ${C.border}`,
                              background:ans.rating===r?`${RATINGS[r].color}22`:C.light,
                              color:ans.rating===r?RATINGS[r].color:C.dim}}>
                              {r===1?"1 — Weak":r===2?"2 — Good":"3 — Strong"}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* Q1 Availability Widget */}
                      {step===1&&(
                        <div style={{marginTop:20,borderTop:`1px solid ${C.border}`,paddingTop:18}}>
                          <div style={{fontSize:11,color:co.colorL||C.amber,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:13}}>🗓 Fill In Their Availability</div>
                          <div style={{fontSize:11,color:C.dim,marginBottom:7,letterSpacing:"0.04em",textTransform:"uppercase"}}>Available Months</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
                            {MONTHS.map(m=>{const on=avail.months[m];return(
                              <button key={m} onClick={()=>setAvail(p=>({...p,months:{...p.months,[m]:!p.months[m]}}))} style={{
                                padding:"6px 11px",borderRadius:16,fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif",minHeight:36,
                                border:`1px solid ${on?C.tealL:C.border}`,background:on?`${C.tealL}22`:C.light,
                                color:on?C.tealL:C.dim,fontWeight:on?"bold":"normal"}}>{m}</button>
                            );})}
                          </div>
                          <div style={{fontSize:11,color:C.dim,marginBottom:7,letterSpacing:"0.04em",textTransform:"uppercase"}}>Available Days & Shift</div>
                          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
                            {DAYS.map(d=>{const dd=avail.days[d]||{on:false,shift:""};return(
                              <div key={d} className="avail-day-row" style={{background:dd.on?`${C.tealL}11`:C.bg,border:`1px solid ${dd.on?C.tealL:C.border}`}}>
                                <button onClick={()=>setAvail(p=>({...p,days:{...p.days,[d]:{...p.days[d],on:!dd.on,shift:dd.shift||"Full Day"}}}))} style={{
                                  width:22,height:22,minWidth:22,borderRadius:3,cursor:"pointer",
                                  border:`2px solid ${dd.on?C.tealL:C.border}`,background:dd.on?C.teal:"transparent",
                                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                                  {dd.on&&<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                                </button>
                                <span style={{fontSize:12,fontWeight:"bold",color:dd.on?C.cream:C.dim,width:30}}>{d}</span>
                                {dd.on&&<div className="shift-btns">
                                  {["Morning","Afternoon","Full Day"].map(s=>(
                                    <button key={s} onClick={()=>setAvail(p=>({...p,days:{...p.days,[d]:{...p.days[d],shift:s}}}))} style={{
                                      padding:"4px 9px",borderRadius:10,fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif",minHeight:30,
                                      border:`1px solid ${dd.shift===s?C.amber:C.border}`,background:dd.shift===s?`${C.amber}22`:"transparent",
                                      color:dd.shift===s?C.amberL:C.dim}}>{s}</button>
                                  ))}
                                </div>}
                              </div>
                            );})}
                          </div>
                          <div style={{fontSize:11,color:C.dim,marginBottom:7,letterSpacing:"0.04em",textTransform:"uppercase"}}>Commitment Level</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:16}}>
                            {COMMIT.map(cl=>{const on=avail.commitment===cl;return(
                              <button key={cl} onClick={()=>setAvail(p=>({...p,commitment:on?"":cl}))} style={{
                                padding:"7px 14px",borderRadius:16,fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif",minHeight:36,
                                border:`1px solid ${on?C.amberL:C.border}`,background:on?`${C.amber}22`:C.light,
                                color:on?C.amberL:C.dim,fontWeight:on?"bold":"normal"}}>{cl}</button>
                            );})}
                          </div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                            <label style={labelS}>Earliest Start<input type="date" style={inputS} value={avail.startDate} onChange={e=>setAvail(p=>({...p,startDate:e.target.value}))}/></label>
                            <label style={labelS}>Latest End<input type="date" style={inputS} value={avail.endDate} onChange={e=>setAvail(p=>({...p,endDate:e.target.value}))}/></label>
                          </div>
                          <label style={labelS}>Scheduling Notes
                            <textarea style={{...inputS,height:56,resize:"vertical"}} placeholder="e.g. Available after May 15, can't work Sundays…"
                              value={avail.availNotes} onChange={e=>setAvail(p=>({...p,availNotes:e.target.value}))}/>
                          </label>
                        </div>
                      )}

                      <div className="nav-btn-row" style={{marginTop:20}}>
                        <button onClick={()=>setStep(step-1)} style={nBtn}>← Back</button>
                        <button onClick={()=>setStep(step+1)} style={{...pBtn,background:co.color||C.amber,color:"#fff"}}>
                          {step<questions.length?"Next →":"Wrap-Up →"}
                        </button>
                      </div>
                    </div>
                  );
                })()}

                {/* Wrap-Up */}
                {step===WRAPUP&&(
                  <div>
                    <div style={{...cardS,marginBottom:14}}>
                      <div style={{fontSize:15,fontWeight:"bold",color:C.amberL,marginBottom:4}}>✅ Wrap-Up Checklist</div>
                      <div style={{fontSize:12,color:C.dim,marginBottom:16,fontStyle:"italic"}}>Check off each topic covered before ending the call.</div>
                      {CHECKLIST.map(item=>(
                        <div key={item.id} className="check-row" onClick={()=>toggleCheck(item.id)}>
                          <div className={`chkbox${checklist[item.id]?" on":""}`}>
                            {checklist[item.id]&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                          </div>
                          <div>
                            <div style={{fontSize:14,color:checklist[item.id]?C.tealL:C.cream,lineHeight:1.4}}>{item.label}</div>
                            <div style={{fontSize:12,color:C.dim,fontStyle:"italic",marginTop:2}}>{item.sub}</div>
                          </div>
                        </div>
                      ))}
                      <div style={{marginTop:12,fontSize:12,color:C.amber,fontWeight:"bold"}}>{Object.values(checklist).filter(Boolean).length} of {CHECKLIST.length} covered</div>
                    </div>
                    <div style={{...cardS,marginBottom:14}}>
                      <div style={{fontSize:15,fontWeight:"bold",color:C.amberL,marginBottom:6}}>📝 Final Notes</div>
                      <div style={{fontSize:12,color:C.dim,marginBottom:12,fontStyle:"italic"}}>Gut feeling, red flags, standout moments, follow-up items.</div>
                      <textarea style={{...inputS,height:110,resize:"vertical"}}
                        placeholder="e.g. 3 years at McMenamins, OLCC current, wants May 1st, very personable…"
                        value={finalNotes} onChange={e=>setFinalNotes(e.target.value)} autoFocus/>
                    </div>
                    <div className="nav-btn-row">
                      <button onClick={()=>setStep(questions.length)} style={nBtn}>← Back</button>
                      <button onClick={finish} style={{...pBtn,background:C.teal}}>✓ Finish & Score</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })()}

          {/* ── SUMMARY ── */}
          {view==="summary"&&current&&(()=>{
            const t=tier(current.pct);const co=COMPANIES[current.company]||{};const pos=POS_LABELS[current.position]||{};
            const qs=POS_QUESTIONS[current.position]||[];
            const checkedCount=Object.values(current.checklist||{}).filter(Boolean).length;
            const av=current.avail||{};
            const months=Object.keys(av.months||{}).filter(m=>av.months[m]);
            const days=Object.keys(av.days||{}).filter(d=>av.days[d]&&av.days[d].on);
            return(
              <div>
                <div style={{...cardS,marginBottom:14,textAlign:"center",padding:"24px 18px"}}>
                  <div style={{fontSize:44,marginBottom:7}}>{current.pct>=80?"🟢":current.pct>=55?"🟡":"🔴"}</div>
                  <div style={{fontSize:24,fontWeight:"bold",color:C.amberL}}>{current.name}</div>
                  <div style={{fontSize:12,color:C.dim,marginTop:4}}>{co.icon} {co.name} · {pos.icon} {pos.title} · {current.date}</div>
                  <div style={{fontSize:34,fontWeight:"bold",color:t.color,margin:"14px 0 4px"}}>{current.pct}%</div>
                  <div style={{fontSize:13,color:t.color}}>{t.label}</div>
                  <div style={{fontSize:12,color:C.dim,marginTop:3}}>Score: {current.score}/{current.max} · Checklist: {checkedCount}/{CHECKLIST.length}</div>
                  <div className="status-btn-row">
                    <span style={{fontSize:12,color:C.dim,alignSelf:"center"}}>Mark as:</span>
                    {[{key:"hired",label:"✅ Hire"},{key:"hold",label:"⏸ Hold"},{key:"pass",label:"✗ Pass"}].map(opt=>{
                      const active=current.status===opt.key;const cfg=STATUS_CFG[opt.key];
                      return(<button key={opt.key} onClick={()=>{
                        const updated=candidates.map(c=>c.id===current.id?{...c,status:c.status===opt.key?null:opt.key}:c);
                        setCandidates(updated);persist(updated);setCurrent(p=>({...p,status:p.status===opt.key?null:opt.key}));
                      }} style={{padding:"8px 14px",borderRadius:20,fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif",fontWeight:active?"bold":"normal",minHeight:38,
                        border:`1px solid ${active?cfg.border:C.border}`,background:active?cfg.bg:"transparent",color:active?cfg.color:C.dim}}>{opt.label}</button>);
                    })}
                  </div>
                  {current.status==="hired"&&<div style={{marginTop:14}}>
                    <button onClick={()=>setContractFor(current)} style={{...pBtn,background:C.teal}}>📄 Generate Offer Letter</button>
                  </div>}
                </div>

                {(months.length>0||days.length>0||av.commitment)&&(
                  <div style={{...cardS,marginBottom:14}}>
                    <div style={{fontSize:15,fontWeight:"bold",color:C.amberL,marginBottom:12}}>🗓 Availability</div>
                    {months.length>0&&<div style={{marginBottom:7,display:"flex",flexWrap:"wrap",gap:5}}>
                      {months.map(m=><span key={m} style={{background:`${C.tealL}22`,border:`1px solid ${C.tealL}`,color:C.tealL,borderRadius:10,padding:"2px 8px",fontSize:11,fontWeight:"bold"}}>{m}</span>)}</div>}
                    {days.length>0&&<div style={{marginBottom:5,display:"flex",flexWrap:"wrap",gap:"3px 12px"}}>
                      {days.map(d=><span key={d} style={{fontSize:12,color:C.cream}}><b>{d}</b> <span style={{color:C.dim,fontSize:11}}>— {av.days[d].shift||"Full Day"}</span></span>)}</div>}
                    {av.commitment&&<div style={{fontSize:13,color:C.amberL,fontWeight:"bold",marginBottom:av.availNotes?4:0}}>{av.commitment}</div>}
                    {av.availNotes&&<div style={{fontSize:12,color:C.dim,fontStyle:"italic"}}>{av.availNotes}</div>}
                  </div>
                )}

                <div style={{...cardS,marginBottom:14}}>
                  <div style={{fontSize:15,fontWeight:"bold",color:C.amberL,marginBottom:14}}>Interview Breakdown</div>
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    {qs.map((q,i)=>{const a=current.answers[q.id]||{};const rl=RATINGS[a.rating||0];
                      return(<div key={q.id} style={{borderBottom:`1px solid ${C.border}`,paddingBottom:12}}>
                        <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
                          <div style={{fontSize:13,color:C.cream,flex:1,lineHeight:1.5}}><span style={{color:C.dim,marginRight:5}}>{i+1}.</span>{q.text}</div>
                          <span style={{fontSize:12,fontWeight:"bold",color:rl.color,whiteSpace:"nowrap"}}>{rl.label}</span>
                        </div>
                        {a.note&&<div style={{fontSize:12,color:C.dim,marginTop:5,fontStyle:"italic",paddingLeft:14}}>"{a.note}"</div>}
                      </div>);})}
                  </div>
                </div>

                {current.finalNotes&&<div style={{...cardS,marginBottom:14}}>
                  <div style={{fontSize:15,fontWeight:"bold",color:C.amberL,marginBottom:8}}>📝 Final Notes</div>
                  <div style={{fontSize:13,color:C.dim,fontStyle:"italic",lineHeight:1.7}}>{current.finalNotes}</div>
                </div>}

                <div className="nav-btn-row">
                  <button onClick={()=>setView("gateway")} style={{...pBtn,background:co.color||C.amber,color:"#fff"}}>+ Another</button>
                  <button onClick={()=>setView("dashboard")} style={nBtn}>Rankings</button>
                </div>
              </div>
            );
          })()}

          {/* ── DASHBOARD ── */}
          {view==="dashboard"&&(
            <div>
              {/* Stats */}
              <div className="stats-grid">
                {[{label:"Total",val:candidates.length,color:C.amberL},{label:"Hired",val:hiredCount,color:C.tealL},{label:"On Hold",val:holdCount,color:C.amber}].map(s=>(
                  <div key={s.label} style={{...cardS,textAlign:"center",padding:"13px 8px"}}>
                    <div style={{fontSize:24,fontWeight:"bold",color:s.color}}>{s.val}</div>
                    <div style={{fontSize:11,color:C.dim,marginTop:3}}>{s.label}</div>
                  </div>
                ))}
              </div>

              {/* Search */}
              <div style={{position:"relative",marginBottom:14}}>
                <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:C.dim,pointerEvents:"none"}}>🔍</span>
                <input style={{...inputS,paddingLeft:36,borderRadius:8,border:`1px solid ${search?C.amber:C.border}`}}
                  placeholder="Search by name, phone, position or company…"
                  value={search} onChange={e=>setSearch(e.target.value)}/>
                {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
                  background:"transparent",border:"none",color:C.dim,fontSize:16,cursor:"pointer",padding:"6px",minHeight:36}}>✕</button>}
              </div>

              {/* Status filter */}
              <div style={{display:"flex",gap:7,marginBottom:22,flexWrap:"wrap"}}>
                {[{key:"all",label:`All (${candidates.length})`},
                  {key:"hired",label:`✅ Hired (${hiredCount})`},
                  {key:"hold",label:`⏸ Hold (${holdCount})`},
                  {key:"pending",label:"Pending"}].map(t=>(
                  <button key={t.key} className={`tab-btn${dashTab===t.key?" active":""}`} onClick={()=>setDashTab(t.key)}>{t.label}</button>
                ))}
              </div>

              {search&&<div style={{fontSize:12,color:C.amber,marginBottom:14,fontStyle:"italic"}}>
                Results for "{search}" — {candidates.filter(matchSearch).length} match{candidates.filter(matchSearch).length!==1?"es":""}
              </div>}

              {candidates.length===0&&(
                <div style={{...cardS,textAlign:"center",padding:"44px 20px"}}>
                  <div style={{fontSize:32,marginBottom:10}}>🦁☕⚓</div>
                  <div style={{color:C.dim,fontSize:14}}>No interviews yet.</div>
                  <button onClick={()=>setView("gateway")} style={{...pBtn,marginTop:18}}>+ Start Interview</button>
                </div>
              )}

              {/* Company sections */}
              {Object.entries(COMPANIES).map(([coKey,coData])=>{
                const coFiltered=[...candidates]
                  .filter(c=>c.company===coKey)
                  .filter(c=>dashTab==="all"||(dashTab==="pending"?(!c.status||c.status==="pass"):c.status===dashTab))
                  .filter(matchSearch)
                  .sort((a,b)=>b.pct-a.pct);
                const coTotal=candidates.filter(c=>c.company===coKey).length;
                if(coTotal===0&&dashTab==="all"&&!search) return null;
                if(coFiltered.length===0) return null;
                return(
                  <div key={coKey} style={{marginBottom:28}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                      borderBottom:`2px solid ${coData.color}`,paddingBottom:9,marginBottom:12}}>
                      <div style={{display:"flex",alignItems:"center",gap:9}}>
                        <span style={{fontSize:22}}>{coData.icon}</span>
                        <div>
                          <div style={{fontSize:15,fontWeight:"bold",color:coData.colorL}}>{coData.name}</div>
                          <div style={{fontSize:11,color:C.dim}}>{coData.address}</div>
                        </div>
                      </div>
                      <div className="co-hdr-stats">
                        <span style={{color:C.amberL,fontWeight:"bold"}}>{candidates.filter(c=>c.company===coKey).length} interviewed</span>
                        <span style={{color:C.tealL}}>{candidates.filter(c=>c.company===coKey&&c.status==="hired").length} hired</span>
                        <span style={{color:C.amber}}>{candidates.filter(c=>c.company===coKey&&c.status==="hold").length} hold</span>
                      </div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:9}}>
                      {coFiltered.map(c=><CandidateCard key={c.id} c={c}/>)}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

        </div>
      </div>
    );
  }

  function Root(){
    const [authed,setAuthed]=React.useState(!!sessionStorage.getItem("nhg-auth"));
    if(!authed) return <LoginGate onUnlock={()=>setAuthed(true)}/>;
    return <App/>;
  }

  const root=ReactDOM.createRoot(document.getElementById("root"));
  root.render(<Root/>);
</script>
</body>
</html>
